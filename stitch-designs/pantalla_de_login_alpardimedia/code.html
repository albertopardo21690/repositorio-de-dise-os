<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Iniciar Sesión - Alpardimedia</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5045e8",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121121",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="max-w-md w-full">
<!-- Brand Logo Header -->
<div class="flex flex-col items-center mb-8">
<div class="bg-primary/10 p-3 rounded-xl mb-4">
<span class="material-symbols-outlined text-primary text-4xl">
                    polymer
                </span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold tracking-tight">Alpardimedia</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Plataforma SaaS para profesionales</p>
</div>
<!-- Login Card -->
<div class="bg-white dark:bg-slate-900 shadow-xl shadow-primary/5 rounded-xl border border-slate-200 dark:border-slate-800 p-8">
<div class="mb-8">
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-semibold">Iniciar sesión</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Bienvenido de nuevo, ingresa tus credenciales</p>
</div>
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">
                        Correo electrónico
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">
                            mail
                        </span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="ejemplo@correo.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">
                            Contraseña
                        </label>
<a class="text-xs font-semibold text-primary hover:text-primary/80 transition-colors" href="#">
                            ¿Olvidaste tu contraseña?
                        </a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">
                            lock
                        </span>
<input class="w-full pl-10 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 flex items-center" type="button">
<span class="material-symbols-outlined text-lg">
                                visibility
                            </span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary bg-white dark:bg-slate-800 transition-colors" id="remember" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400" for="remember">
                        Mantener mi sesión iniciada
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 px-4 rounded-lg shadow-lg shadow-primary/20 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined text-lg">
                        login
                    </span>
</button>
</form>
<!-- Secondary Action -->
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                    ¿No tienes una cuenta? 
                    <a class="text-primary font-semibold hover:underline" href="#">Regístrate gratis</a>
</p>
</div>
</div>
<!-- Security Footer -->
<div class="mt-8 flex items-center justify-center gap-6 opacity-60 grayscale">
<div class="flex items-center gap-2 text-xs text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span>Conexión segura</span>
</div>
<div class="flex items-center gap-2 text-xs text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-sm">security</span>
<span>Encriptación SSL</span>
</div>
</div>
</div>
<!-- Decorative background elements -->
<div class="fixed top-0 left-0 -z-10 w-full h-full overflow-hidden pointer-events-none">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
</div>
</body></html>
